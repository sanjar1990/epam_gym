spring.application.name=gym-main-service
server.port=8080
spring.profiles.active=dev
################
# Log Config
################
logging.level.root=info

# Console
logging.pattern.console=%date{dd MMM yyyy;HH:mm:ss.SSS}  %highlight(%-5level) %cyan(%logger{36}) - [%X{transactionId}] %green(%msg%n)

# File
logging.path.url=logs
logging.file.name=${logging.path.url}/app_log.log
logging.pattern.file=%date{dd MMM yyyy - HH:mm:ss.SSS} - %logger{36} - %-5level - [%X{transactionId}] %msg%n
logging.logback.rollingpolicy.max-file-size=500KB

################
# Values
################
password.characters=ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789

##################
# Flyway Config
#################
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.baselineVersion=0

# Enable circuit breaker for Feign
spring.cloud.openfeign.circuitbreaker.enabled=true

# Resilience4j config
resilience4j.circuitbreaker.instances.workload-service.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.workload-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.workload-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.workload-service.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.workload-service.permittedNumberOfCallsInHalfOpenState=3